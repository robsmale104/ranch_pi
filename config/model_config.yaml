# ─────────────────────────────────────────────────────────────────
# model_config.yaml
# ICEAA 2026 — Ranch Self-Build Cost Engineering Study
# ─────────────────────────────────────────────────────────────────
# Parameters you change between scenario runs.
# Copy and rename (e.g. stress_config.yaml) for alternate scenarios.
# ─────────────────────────────────────────────────────────────────

scenario_name: "Base Scenario"
scenario_description: "OBR forward inflation, base correlation assumptions"

# ── Monte Carlo ────────────────────────────────────────────────────
n_simulations: 500
random_seed: 42

# ── Inflation ──────────────────────────────────────────────────────
# A-INF-01: OBR forward avg 2025-2029 = 1.56% (base)
# A-INF-02: Post-COVID avg 2020-2024  = 4.40% (stress)
# A-INF-03: Long-run avg 1997-2029    = 2.28% (central)
inflation_rate: 0.156
inflation_base_year: 2025
cpi_factors:
  2026: 1.0156
  2027: 1.0314
  2028: 1.0474
  2029: 1.0637
  2030: 1.0802

# ── Programme ──────────────────────────────────────────────────────
programme_months: 36
inservice_start_yr: 2029
inservice_end_yr: 2040
total_model_months: 48
inservice_cbs:
- C1.4.1
- C1.4.2
- C1.4.3

# ── Schedule delay cost ────────────────────────────────────────────
daily_delay_cost_gbp: 2500
days_per_month: 30.4

# ── Correlation (A-COR-01: prototype assumption) ───────────────────
driver_order: [ MAT, LAB, FUEL, SPEC, ENERGY, REG ]
corr_matrix:
- [ 1.00, 0.50, 0.60, 0.30, 0.20, 0.10 ]
- [ 0.50, 1.00, 0.40, 0.30, 0.10, 0.30 ]
- [ 0.60, 0.40, 1.00, 0.20, 0.40, 0.10 ]
- [ 0.30, 0.30, 0.20, 1.00, 0.10, 0.10 ]
- [ 0.20, 0.10, 0.40, 0.10, 1.00, 0.20 ]
- [ 0.10, 0.30, 0.10, 0.10, 0.20, 1.00 ]
